<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — AkariOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #060304;
    color: #f4e9ea;
    font-family: 'Manrope', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  a { text-decoration: none; }
  .halo {
    position: absolute;
    top: 50%; left: 50%;
    width: 900px; height: 900px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224,20,42,.22) 0%, rgba(224,20,42,0) 60%);
    filter: blur(14px);
    animation: haloPulse 10s ease-in-out infinite;
    pointer-events: none;
  }
  .vignette {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 320px 90px rgba(6,3,4,.9);
    pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,60,80,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,60,80,.035) 1px, transparent 1px);
    background-size: 46px 46px;
    animation: drift 26s linear infinite;
    pointer-events: none;
  }
  .wrap { position: relative; z-index: 2; text-align: center; padding: 0 24px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 4px;
    color: #FF3C50; margin-bottom: 22px;
  }
  .code {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 190px; line-height: .9;
    letter-spacing: -6px; margin-bottom: 8px;
    text-shadow: 0 6px 60px rgba(0,0,0,.7);
  }
  .code span { color: #e0142a; animation: glow 4.5s ease-in-out infinite; }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 34px; letter-spacing: -1px;
    margin-bottom: 14px;
  }
  p { color: #9a777b; font-size: 15px; line-height: 1.6; max-width: 460px; margin: 0 auto 34px; }
  .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 15px;
    color: #0c0506; background: #e0142a;
    padding: 15px 30px; border-radius: 10px;
    box-shadow: 0 10px 40px rgba(224,20,42,.4);
    transition: filter .2s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn.ghost {
    color: #f4e9ea; background: rgba(6,3,4,.5);
    border: 1px solid #43222a; box-shadow: none;
  }
  .btn.ghost:hover { border-color: #5c2f37; }
  .stamp {
    position: absolute; bottom: 26px; left: 0; right: 0; z-index: 2;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 3px; color: rgba(244,233,234,.3);
  }
  @keyframes haloPulse { 0%,100% { opacity: .5; } 50% { opacity: .85; } }
  @keyframes glow {
    0%,100% { text-shadow: 0 0 40px rgba(224,20,42,.45); }
    50% { text-shadow: 0 0 70px rgba(224,20,42,.85), 0 0 120px rgba(224,20,42,.4); }
  }
  @keyframes drift { 0% { background-position: 0 0; } 100% { background-position: 0 46px; } }
  @media (max-width: 640px) {
    .code { font-size: 120px; letter-spacing: -4px; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="halo"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="eyebrow">// SIGNAL LOST</div>
    <div class="code">4<span>0</span>4</div>
    <h1>This page got debloated.</h1>
    <p>The page you're looking for isn't here — maybe it was moved, removed, or never existed. Let's get you back to a clean state.</p>
    <div class="actions">
      <a class="btn" href="/">Back to home</a>
      <a class="btn ghost" href="https://discord.gg/Jcsaf9UYSG">Join the Discord →</a>
    </div>
  </div>

  <div class="stamp">死月 · AKARI · 0xE0142A</div>
</body>
</html>
